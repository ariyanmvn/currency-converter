<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Mona+Sans:ital,wght@0,200..900;1,200..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap");
  </style>
  <body>
    <div class="texts">
      <h1>Currency Converter</h1>
      <p>Check live rates, set rate alerts, receive notifications and more.</p>
    </div>

    <div class="container">
      <div class="box">
        <form class="from">
          <span>Amount</span>
          <div class="area">
            <div class="f">
              <img
                class="logo"
                src="https://flagsapi.com/US/flat/64.png"
                alt=""
              />

              <select name="from" id="from-select" class="select"></select>
            </div>
            <input value="1" id="from-input" type="number" />
          </div>
        </form>
        <div class="hr">
          <hr />
          <div class="round">
            <svg
              width="15"
              height="20"
              viewBox="0 0 15 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M8.51036 13.75C8.51036 14.0214 8.5987 14.2855 8.76205 14.5022C8.92539 14.719 9.15485 14.8767 9.41575 14.9516C9.67666 15.0264 9.95483 15.0143 10.2082 14.917C10.4616 14.8198 10.6765 14.6427 10.8204 14.4125L14.1804 11.0537C14.2964 10.9376 14.3885 10.7998 14.4512 10.648C14.514 10.4963 14.5463 10.3337 14.5462 10.1696C14.5462 10.0054 14.5138 9.84281 14.4509 9.69114C14.388 9.53947 14.2959 9.40168 14.1797 9.28562C14.0636 9.16957 13.9257 9.07752 13.774 9.01475C13.6223 8.95197 13.4597 8.91969 13.2955 8.91975C13.1314 8.9198 12.9688 8.9522 12.8171 9.01509C12.6655 9.07797 12.5277 9.17011 12.4116 9.28625L11.0116 10.6862V1.25C11.0116 0.918479 10.8799 0.600537 10.6455 0.366117C10.4111 0.131696 10.0931 0 9.76161 0C9.43009 0 9.11215 0.131696 8.87772 0.366117C8.6433 0.600537 8.51161 0.918479 8.51161 1.25V13.6875V13.75H8.51036Z"
                fill="white"
              />
              <path
                d="M6.05036 6.25C6.05036 5.97858 5.96201 5.71453 5.79867 5.49775C5.63533 5.28098 5.40587 5.12326 5.14496 5.04844C4.88406 4.97361 4.60588 4.98574 4.35248 5.08299C4.09908 5.18024 3.88421 5.35733 3.74036 5.5875L0.38161 8.94625C0.262222 9.06156 0.166994 9.19949 0.101483 9.352C0.0359717 9.5045 0.00148947 9.66852 4.71963e-05 9.8345C-0.00139507 10.0005 0.0302318 10.1651 0.0930829 10.3187C0.155934 10.4723 0.24875 10.6119 0.366116 10.7292C0.483482 10.8466 0.623047 10.9394 0.776668 11.0023C0.930288 11.0651 1.09489 11.0968 1.26086 11.0953C1.42684 11.0939 1.59086 11.0594 1.74337 10.9939C1.89587 10.9284 2.0338 10.8331 2.14911 10.7138L3.55036 9.31375V18.75C3.55036 19.0815 3.68206 19.3995 3.91648 19.6339C4.1509 19.8683 4.46884 20 4.80036 20C5.13188 20 5.44982 19.8683 5.68424 19.6339C5.91866 19.3995 6.05036 19.0815 6.05036 18.75V6.3125V6.25Z"
                fill="white"
              />
            </svg>
          </div>
        </div>
        <form class="to">
          <span>Converted Amount</span>
          <div class="area">
            <div class="f">
              <img
                class="logo"
                src="https://flagsapi.com/BD/flat/64.png"
                alt=""
              />
              <select name="to" id="to-select" class="select"></select>
            </div>
            <div style="display: flex; flex-direction: column;gap: 10px; justify-content: center; align-items: center;">
              <input id="to-input" value="123" type="text" />
              <button id="copy-amount">Copy Amount</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="rates-container">
      <div class="rates">
        <p>Indicative Exchange Rate</p>
        <h1 id="rate"></h1>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
